<body>
    <div class="container">
        <div class="map-wrapper">
            <div id="map"></div>
            <div id="globe"></div>
        </div>
    </div>

    <script>

        const map = new maplibregl.Map({
            container: "map",
            style: "osm_raster.json",
            center: [-79.381394, 43.656482],
            zoom: 4,
            minZoom: 4,
            maxZoom: 4,
            bearing: 0,
            pitch: 0,
            hash: true,
            pixelRatio: 1,
            dragRotate: false,
            touchPitch: false
        });

        const globe = new maplibregl.Map({
            container: "globe",
            style: "osm_raster.json",
            fitBounds: [[-180, -85], [180, 85]],
            center: [-79.381394, 43.656482],
            zoom: -0.7,
            attributionControl: false,
            interactive: false,
            dragRotate: false,
            touchPitch: false
        });

        globe.on("load", () => {
            globe.setProjection({
                type: "globe"
            });
        });

        map.on("load", async () => {

            function syncGlobe() {
                globe.jumpTo({
                    center: map.getCenter()
                });
            }

            map.on("move", syncGlobe);

            map.scrollZoom.disable();
            map.boxZoom.disable();
            map.doubleClickZoom.disable();
            map.keyboard.disable();
            map.touchZoomRotate.disable();
